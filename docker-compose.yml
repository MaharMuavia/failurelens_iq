services:
  api:
    build: .
    env_file:
      - .env.demo
    ports:
      - "8000:8000"
    environment:
      - APP_MODE=${APP_MODE:-demo}
      - IQ_PROVIDER=${IQ_PROVIDER:-local}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
  frontend:
    build: ./frontend
    env_file:
      - .env.demo
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_PROXY_TARGET=http://api:8000
    healthcheck:
      test: ["CMD", "node", "-e", "http = require('http'); req = http.request({host: 'localhost', port: 5173, path: '/', timeout: 2000}, (res) => { if (res.statusCode === 200) { process.exit(0); } else { process.exit(1); } }); req.on('error', () => process.exit(1)); req.end();"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
