# Production-oriented overlay.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env up --build
#
# Required in .env for a hardened production run:
#   APP_MODE=production
#   IQ_PROVIDER=azure_foundry
#   ENABLE_AUTH=true
#   API_KEY=<strong server-side API key>
#   CORS_ORIGINS=<your frontend origin>
#   AZURE_OPENAI_ENDPOINT, AZURE_OPENAI_API_KEY, AZURE_OPENAI_DEPLOYMENT
#   AZURE_AI_SEARCH_ENDPOINT, AZURE_AI_SEARCH_KEY, AZURE_AI_SEARCH_INDEX
#   AZURE_STORAGE_CONNECTION_STRING
#   AZURE_COSMOS_ENDPOINT, AZURE_COSMOS_KEY, AZURE_COSMOS_DATABASE, AZURE_COSMOS_CONTAINER

services:
  api:
    env_file:
      - .env
    environment:
      APP_MODE: ${APP_MODE:-production}
      IQ_PROVIDER: ${IQ_PROVIDER:-azure_foundry}
      ENABLE_AUTH: ${ENABLE_AUTH:-true}
      API_KEY: ${API_KEY:?Set API_KEY in .env for production}
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS in .env for production}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
      AZURE_AI_SEARCH_ENDPOINT: ${AZURE_AI_SEARCH_ENDPOINT:-}
      AZURE_AI_SEARCH_KEY: ${AZURE_AI_SEARCH_KEY:-}
      AZURE_AI_SEARCH_INDEX: ${AZURE_AI_SEARCH_INDEX:-}
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
      AZURE_BLOB_CONTAINER: ${AZURE_BLOB_CONTAINER:-failurelens-iq}
      AZURE_COSMOS_ENDPOINT: ${AZURE_COSMOS_ENDPOINT:-}
      AZURE_COSMOS_KEY: ${AZURE_COSMOS_KEY:-}
      AZURE_COSMOS_DATABASE: ${AZURE_COSMOS_DATABASE:-failurelens}
      AZURE_COSMOS_CONTAINER: ${AZURE_COSMOS_CONTAINER:-reasoning_traces}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  frontend:
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:?Set VITE_API_BASE_URL in .env for production}
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://api:8000}
      VITE_DEMO_API_KEY: ${VITE_DEMO_API_KEY:-}
      VITE_VIDEO_DEMO_MODE: ${VITE_VIDEO_DEMO_MODE:-false}
    healthcheck:
      test: ["CMD", "node", "-e", "http = require('http'); req = http.request({host: 'localhost', port: 5173, path: '/', timeout: 2000}, (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('error', () => process.exit(1)); req.end();"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
