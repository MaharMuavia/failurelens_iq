name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: pytest tests -v

      - name: Verify .env is not committed
        run: python -c "from pathlib import Path; assert not Path('.env').exists(), '.env file must not be committed to repository'"

      - name: Check README for local file links
        run: python -c "from pathlib import Path; text=Path('README.md').read_text(encoding='utf-8'); assert 'file:///' not in text"

      - name: Verify architecture diagram exists
        run: python -c "from pathlib import Path; assert Path('docs/ARCHITECTURE_DIAGRAM.md').exists(); assert Path('docs/architecture-diagram.mmd').exists()"

      - name: Verify video demo docs exist
        run: python -c "from pathlib import Path; required=['docs/VIDEO_DEMO_SCRIPT.md','docs/VIDEO_DEMO_CHECKLIST.md','docs/JUDGE_QA.md','docs/DEMO_COMMANDS.md','docs/SUBMISSION_CHECKLIST.md']; missing=[p for p in required if not Path(p).exists()]; assert not missing, missing"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test -- --run

      - name: Build frontend
        working-directory: frontend
        run: npm run build
